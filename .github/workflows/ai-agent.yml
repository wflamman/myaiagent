name: AI Agent

on:
  issues:
    types: [opened]
  issue_comment:
    types: [created]

permissions:
  issues: write

jobs:
  ai-agent:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Run agent
        uses: actions/github-script@v7
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        with:
          script: |
            const issueNumber = context.issue.number;

            const { data: issue } = await github.rest.issues.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
            });
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
            });

            // Build Gemini conversation history
            const systemPrompt = "You are an AI agent helping users complete a structured process via GitHub issues. Guide the user through self-assessment, asking one question at a time. When fully complete and documented, end your reply with exactly: [PROCESS_COMPLETE]\n\n";
            const contents = [
              { role: "user", parts: [{ text: systemPrompt + `Issue: ${issue.title}\n\n${issue.body}` }] }
            ];
            for (const c of comments) {
              const isBot = c.user.login === 'github-actions[bot]';
              contents.push({
                role: isBot ? "model" : "user",
                parts: [{ text: c.body }]
              });
            }

            // Call Gemini
            const res = await fetch(
              `https://generativelanguage.googleapis.com/v1/models/gemini-1.0-pro:generateContent?key=${process.env.GOOGLE_API_KEY}`,
              {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                  contents
                })
              }
            );

            const data = await res.json();
            console.log("Gemini status:", res.status);
            console.log("Gemini response:", JSON.stringify(data, null, 2));

            if (!res.ok || !data.candidates || data.candidates.length === 0) {
              const errorMsg = `Error calling Gemini API: ${res.status} ${res.statusText}. Response: ${JSON.stringify(data)}`;
              console.error(errorMsg);
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body: `Sorry, there was an error processing your request: ${errorMsg}`
              });
              return;
            }

            const reply = data.candidates[0].content.parts[0].text;

            if (!reply || reply.trim() === '') {
              reply = "I'm sorry, I couldn't generate a response. Please try rephrasing your request.";
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: reply
            });

            if (reply.includes("[PROCESS_COMPLETE]")) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                state: "closed"
              });
            }